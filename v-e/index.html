<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Convite de Noivado</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
      background-image: url('./img/bg.webp');
      background-size: cover;
      background-repeat: no-repeat;
      font-family:'Playfair Display', serif;
      overflow-x:hidden;
      position:relative;
    }

    /* Background floral effect */
    body::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 35%);
      pointer-events:none;
    }

    .card{
      width:100%;
      max-width:390px;
      background:#f5f1e8;
      border-radius:220px 220px 0 0;
      border:2px solid #b5c2b0;
      padding:45px 32px;
      text-align:center;
      position:relative;
      box-shadow:
      0 25px 45px rgba(0,0,0,0.18),
      inset 0 0 0 8px rgba(255,255,255,0.4);

      animation:fadeUp 1.3s ease;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:12px;
      border-radius:220px 220px 0 0;
      border:1px solid rgba(145,160,140,0.5);
      pointer-events:none;
    }

    .top-text{
      margin-top:15px;
      font-size:16px;
      font-style:italic;
      color:#111;
      line-height:1.6;
      animation:fadeIn 2s ease;
    }

    .family{
      margin-top:18px;
      font-size:20px;
      font-weight:500;
      line-height:1.5;
    }

    .invite{
      margin-top:18px;
      font-size:15px;
      line-height:1.6;
    }

    .divider{
      width:100%;
      height:1px;
      background:#444;
      margin:16px 0;
      opacity:0.6;
    }

    .subtitle{
      font-style:italic;
      font-size:16px;
      margin-top:10px;
    }

    .names{
      margin-top:25px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .names h1{
      font-family:'Great Vibes', cursive;
      font-size:58px;
      color:#2f8a43;
      font-weight:400;
      animation:float 4s ease-in-out infinite;
    }

    .rings{
      font-size:42px;
      animation:spin 6s linear infinite;
    }

    .date-box{
      margin:35px auto 25px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    .date-side{
      font-size:18px;
      border-bottom:1px solid #7a8b75;
      border-top:1px solid #7a8b75;
      padding:4px 8px;
      letter-spacing:1px;
    }

    .date-center{
      width:72px;
      height:72px;
      border:2px solid #a3b49e;
      border-radius:50%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:white;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      animation:pulse 3s infinite;
    }

    .date-center span:first-child{
      font-size:34px;
      line-height:1;
    }

    .date-center span:last-child{
      font-size:12px;
      letter-spacing:1px;
    }

    .details{
      margin-top:10px;
      font-size:17px;
      line-height:1.8;
      color:#111;
    }

    .details strong{
      font-weight:700;
    }

    .highlight{
      color:#b57a2f;
      font-weight:600;
    }

    .interaction{
      margin-top:30px;
      color:#97a892;
      font-size:24px;
      font-weight:600;
    }

    .actions{
      margin-top:25px;
      display:flex;
      justify-content:center;
      gap:28px;
      flex-wrap:wrap;
    }

    .action{
      text-decoration:none;
      color:#5c3d10;
      transition:0.4s;
    }

    .action:hover{
      transform:translateY(-6px) scale(1.05);
    }

    .icon{
      width:70px;
      height:70px;
      background:#c59a53;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-size:30px;
      margin:auto;
      box-shadow:0 10px 18px rgba(0,0,0,0.15);
      transition:0.4s;
    }

    .action:hover .icon{
      transform:rotate(8deg);
    }

    .action p{
      margin-top:10px;
      font-size:13px;
      text-decoration:underline;
      line-height:1.3;
    }

    .footer{
      margin-top:28px;
      font-size:18px;
    }

    .footer span{
      color:#214fa3;
      text-decoration:underline;
      font-weight:bold;
    }

    /* Animations */

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-6px);
      }
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.05);
      }
      100%{
        transform:scale(1);
      }
    }

    @media(max-width:480px){

      .card{
        padding:40px 22px;
      }

      .names h1{
        font-size:48px;
      }

      .details{
        font-size:15px;
      }

      .interaction{
        font-size:20px;
      }

    }
  </style>
</head>

<body>

  <div class="card">

    <div class="top-text">
      💍 Com muita alegria que
    </div>

    <div class="family">
      Família Muehiua & Família Daniel
    </div>

    <div class="invite">
      Têm a honra de convidar<br>
      <br><span class="name"></span>
    </div>

    <div class="divider"></div>

    <div class="subtitle">
      Para celebração do noivado dos seus filhos
    </div>

    <div class="names">
      <h1>Vanessa</h1>
      <div class="rings">💍</div>
      <h1>Ermelindo</h1>
    </div>

    <div class="date-box">

      <div class="date-side">
        SÁBADO 
      </div>

      <div class="date-center">
        <span>30</span>
        <span>MAIO</span>
      </div>

      <div class="date-side">
        2026
      </div>

    </div>

    <div class="details">
      O jantar acontecerá na
      <strong>residência da Família Muehiua.</strong>

      <br>

      Será uma honra compartilhar esse momento especial ao seu
      <span class="highlight">lado!</span>
    </div>

      Clique nos Icones para Interagir
    </div>

    <div class="actions">

      <a href="#" class="action">
        <div class="icon">📍</div>
        <p>SALÃO DE<br>FESTAS</p>
      </a>

      <a href="#" class="action">
        <div class="icon">✔</div>
        <p>CONFIRMAR<br>PRESENÇA</p>
      </a>

    </div>

    <div class="footer">
      Válido para <span>01</span> Pessoa(s)
    </div>

<script>
    async function loadGuestData() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      const wrapper = document.querySelector(".card");
      const nameEl = wrapper.querySelector(".name");

      if (!code) {
        wrapper.innerHTML = `<h2 style="color:#a00;">Convite não encontrado</h2><p>Por favor, use o link correto para visualizar seu convite.</p>`;
        return;
      }

      try {
        const response = await fetch("https://script.google.com/macros/s/1HBt3MSezPEyzmNvtp6xUwU-B2kibvAX-ZCFPIkIxe8o/exec?code=" + code);
        const data = await response.json();

        if (data.error) {
          wrapper.innerHTML = `<h2 style="color:#a00;">Convite não encontrado</h2><p>Este código não corresponde a nenhum convidado autorizado.</p>`;
        } else {
          nameEl.innerText = data.name;

        }
      } catch (err) {
        wrapper.innerHTML = `<h2 style="color:#a00;">Erro ao carregar!</h2><p>Não foi possível verificar o convite. Tente novamente mais tarde.</p>`;
      }
    }

    window.onload = loadGuestData;
 </script>
</body>
